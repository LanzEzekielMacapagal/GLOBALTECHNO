<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classrooms | Global Techno Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
        <img src="assets/global-techno-hub-logo.jpg" alt="Global Techno Hub Learning Center logo" class="brand-logo">
        <span class="lh-sm">
          <strong class="d-block">Global Techno Hub</strong>
          <small class="text-secondary">Client Portal</small>
        </span>
      </a>
      <button class="btn btn-outline-secondary" type="button" id="clientLogout">Logout</button>
    </div>
  </nav>

  <main class="container-fluid px-3 px-lg-4 py-4">
    <header class="d-flex flex-column flex-xl-row justify-content-between gap-3 mb-4">
      <div>
        <p class="section-label mb-1">Learner portal</p>
        <h1 class="display-title mb-0">My Training Dashboard</h1>
      </div>
    </header>

    <section class="row g-3">
      <div class="col-12 col-lg-6">
        <article class="card classroom-card h-100">
          <div class="course-strip course-strip-primary"><span>01</span></div>
          <div class="card-body">
            <p class="section-label mb-1">Student dashboard</p>
            <h2 class="h4">My Training Dashboard</h2>
            <p class="text-secondary">Open your learner dashboard and import the subject code provided by the admin.</p>
            <a class="btn btn-primary" href="client.html">Open Dashboard</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="course-linking.js"></script>
  <script src="app.js"></script>
</body>
</html>
